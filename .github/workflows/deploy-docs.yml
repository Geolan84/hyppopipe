name: Deploy Zensical Site to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --only docs --no-root
      - name: Build documentation
        run: poetry run zensical build --clean
      - name: Add root redirect
        run: |
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="ru">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=ru/">
              <link rel="canonical" href="https://geolan84.github.io/hyppopipe/ru/">
            </head>
            <body>
              <p><a href="ru/">Hyppopipe Docs</a></p>
            </body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
